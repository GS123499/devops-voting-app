apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: voting-backend
  template:
    metadata:
      labels:
        app: voting-backend
    spec:
      containers:
      - name: backend
        image: your-registry/voting-backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: url
---
apiVersion: v1
kind: Service
metadata:
  name: voting-backend-svc
spec:
  type: ClusterIP
  selector:
    app: voting-backend
  ports:
  - port: 80
    targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voting-frontend
  template:
    metadata:
      labels:
        app: voting-frontend
    spec:
      containers:
      - name: frontend
        image: your-registry/voting-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_SOCKET_URL
          value: "http://api.voting-demo.com"
---
apiVersion: v1
kind: Service
metadata:
  name: voting-frontend-svc
spec:
  type: LoadBalancer
  selector:
    app: voting-frontend
  ports:
  - port: 80
    targetPort: 3000
